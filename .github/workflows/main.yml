name: CI Calculatormgd

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "25"

      - name: Permisos gradlew
        run: chmod +x ./gradlew

      - name: Compilar
        run: ./gradlew compileJava --no-daemon
